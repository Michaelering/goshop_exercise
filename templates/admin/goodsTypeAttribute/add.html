{{ define "admin/goodsTypeAttribute/add.html" }}
{{ template "admin/public/page_header.html" .}}

<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-list-alt mr-1"></i>增加商品类型属性</h3>
    </div>
    <div class="card-body">
        <form action="/admin/goodsTypeAttribute/doAdd" method="post">
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">属性名称</label>
                <div class="col-sm-6">
                    <input type="text" name="title" class="form-control" placeholder="请输入属性名称" required>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">所属类型</label>
                <div class="col-sm-6">
                    <select name="cate_id" id="cate_id" class="form-control">
                        {{$cateId := .cateId}}
                        {{range $key,$value := .goodsTypeList}}
                            <option {{if eq $cateId $value.Id}} selected {{end}} value="{{$value.Id}}">{{$value.Title}}</option>
                        {{end}}
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">录入方式</label>
                <div class="col-sm-8">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="attr_type" value="1" checked id="text">
                        <label class="form-check-label" for="text">单行文本框</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="attr_type" value="2" id="textarea">
                        <label class="form-check-label" for="textarea">多行文本框</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="attr_type" value="3" id="select">
                        <label class="form-check-label" for="select">从下面的列表中选择（一行代表一个可选值）</label>
                    </div>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">可选值列表</label>
                <div class="col-sm-8">
                    <textarea name="attr_value" id="attr_value" class="form-control" rows="5" disabled placeholder="选择"从列表中选择"时启用"></textarea>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">排序</label>
                <div class="col-sm-3">
                    <input type="number" name="sort" class="form-control" value="10">
                </div>
            </div>
            <div class="form-group row">
                <div class="col-sm-6 offset-sm-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check mr-1"></i>提交</button>
                    <a href="javascript:history.back()" class="btn btn-default ml-2"><i class="fas fa-arrow-left mr-1"></i>返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

{{ template "admin/public/page_footer.html" .}}
<script>
$(function(){
    $("input[name='attr_type']").change(function(){
        if($(this).val()==3){
            $("#attr_value").attr("disabled",false)
        }else{
            $("#attr_value").attr("disabled",true)
        }
    })
})
</script>
{{end}}
