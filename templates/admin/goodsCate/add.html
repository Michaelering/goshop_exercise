{{ define "admin/goodsCate/add.html" }}
{{ template "admin/public/page_header.html" .}}

<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-sitemap mr-1"></i>增加商品分类</h3>
    </div>
    <div class="card-body">
        <form action="/admin/goodsCate/doAdd" method="post" enctype="multipart/form-data">
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">分类名称</label>
                <div class="col-sm-6">
                    <input type="text" name="title" class="form-control" placeholder="请输入分类名称" required>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">上级分类</label>
                <div class="col-sm-6">
                    <select name="pid" id="pid" class="form-control">
                        <option value="0">顶级分类</option>
                        {{range $key,$value := .goodsCateList}}
                        <option value="{{$value.Id}}">{{$value.Title}}</option>
                        {{end}}
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">分类图片</label>
                <div class="col-sm-6">
                    <div class="custom-file">
                        <input type="file" name="cate_img" class="custom-file-input" id="cateImg">
                        <label class="custom-file-label" for="cateImg" data-browse="选择文件">选择图片</label>
                    </div>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">跳转地址</label>
                <div class="col-sm-6">
                    <input type="text" name="link" class="form-control" placeholder="请输入跳转地址">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">分类模板</label>
                <div class="col-sm-6">
                    <input type="text" name="template" class="form-control" placeholder="空表示默认模板">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">SEO标题</label>
                <div class="col-sm-6">
                    <input type="text" name="sub_title" class="form-control" placeholder="请输入SEO标题">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">SEO关键词</label>
                <div class="col-sm-6">
                    <input type="text" name="keywords" class="form-control" placeholder="请输入SEO关键词">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">SEO描述</label>
                <div class="col-sm-8">
                    <textarea name="description" class="form-control" rows="3" placeholder="请输入SEO描述"></textarea>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">排序</label>
                <div class="col-sm-3">
                    <input type="number" name="sort" class="form-control" value="10">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">状态</label>
                <div class="col-sm-6">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="status1" value="1" checked>
                        <label class="form-check-label" for="status1">显示</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="status0" value="0">
                        <label class="form-check-label" for="status0">隐藏</label>
                    </div>
                </div>
            </div>
            <div class="form-group row">
                <div class="col-sm-6 offset-sm-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check mr-1"></i>提交</button>
                    <a href="javascript:history.back()" class="btn btn-default ml-2"><i class="fas fa-arrow-left mr-1"></i>返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

{{ template "admin/public/page_footer.html" .}}
<script>
$('.custom-file-input').on('change', function() {
    var fileName = $(this).val().split('\\').pop();
    $(this).next('.custom-file-label').html(fileName || '选择文件');
});
</script>
{{end}}
