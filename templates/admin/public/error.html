{{ define "admin/public/error.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3;url={{.redirectUrl}}">
    <title>操作失败</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>
<body class="hold-transition" style="background:#f4f6f9;">
    <div class="container" style="margin-top:80px;max-width:500px;">
        <div class="card card-outline card-danger">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-exclamation-triangle mr-2"></i>操作失败</h3>
            </div>
            <div class="card-body">
                <h5 class="text-danger">{{.message}}</h5>
                <hr>
                <p class="text-muted"><i class="fas fa-clock mr-1"></i>3秒后自动返回，如未返回请手动操作</p>
                <a href="{{.redirectUrl}}" class="btn btn-danger btn-sm"><i class="fas fa-arrow-left mr-1"></i>立即返回</a>
            </div>
        </div>
    </div>
</body>
</html>
{{ end }}
