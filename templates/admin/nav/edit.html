{{ define "admin/nav/edit.html" }}
{{ template "admin/public/page_header.html" .}}

<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-compass mr-1"></i>编辑导航</h3>
    </div>
    <div class="card-body">
        <form action="/admin/nav/doEdit" method="post">
            <input type="hidden" name="id" value="{{.nav.Id}}" />
            <input type="hidden" name="prevPage" value="{{.prevPage}}" />
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">导航名称</label>
                <div class="col-sm-6">
                    <input type="text" name="title" class="form-control" value="{{.nav.Title}}" required>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">导航位置</label>
                <div class="col-sm-6">
                    <select name="position" id="position" class="form-control">
                        {{$position := .nav.Position}}
                        <option value="1" {{if eq $position 1}}selected{{end}}>顶部</option>
                        <option value="2" {{if eq $position 2}}selected{{end}}>中间</option>
                        <option value="3" {{if eq $position 3}}selected{{end}}>底部</option>
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">关联商品</label>
                <div class="col-sm-6">
                    <input type="text" name="relation" class="form-control" value="{{.nav.Relation}}">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">导航链接地址</label>
                <div class="col-sm-6">
                    <input type="text" name="link" class="form-control" value="{{.nav.Link}}">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">新窗口打开</label>
                <div class="col-sm-6">
                    <select name="is_opennew" id="is_opennew" class="form-control">
                        {{$isOpennew := .nav.IsOpennew}}
                        <option value="1" {{if eq $isOpennew 1}}selected{{end}}>否</option>
                        <option value="2" {{if eq $isOpennew 2}}selected{{end}}>是</option>
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">排序</label>
                <div class="col-sm-3">
                    <input type="number" name="sort" class="form-control" value="{{.nav.Sort}}">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">状态</label>
                <div class="col-sm-6">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="status1" value="1" {{if eq .nav.Status 1}}checked{{end}}>
                        <label class="form-check-label" for="status1">显示</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="status0" value="0" {{if eq .nav.Status 0}}checked{{end}}>
                        <label class="form-check-label" for="status0">隐藏</label>
                    </div>
                </div>
            </div>
            <div class="form-group row">
                <div class="col-sm-6 offset-sm-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check mr-1"></i>提交</button>
                    <a href="javascript:history.back()" class="btn btn-default ml-2"><i class="fas fa-arrow-left mr-1"></i>返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

{{ template "admin/public/page_footer.html" .}}
{{end}}
