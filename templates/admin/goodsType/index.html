{{ define "admin/goodsType/index.html" }}
{{ template "admin/public/page_header.html" .}}

<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-tags mr-1"></i>商品类型列表</h3>
        <a href="/admin/goodsType/add" class="btn btn-primary btn-sm"><i class="fas fa-plus mr-1"></i>增加商品类型</a>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>商品类型名称</th>
                    <th>商品类型描述</th>
                    <th class="text-center">状态</th>
                    <th class="text-center">操作</th>
                </tr>
            </thead>
            <tbody>
                {{range $key,$value := .goodsTypeList}}
                <tr>
                    <td>{{$value.Title}}</td>
                    <td>{{$value.Description}}</td>
                    <td class="text-center">
                        <label class="status-toggle chStatus" data-id="{{$value.Id}}" data-table="goods_type" data-field="status">
                            <input type="checkbox" {{if eq $value.Status 1}}checked{{end}}>
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td class="text-center">
                        <a href="/admin/goodsTypeAttribute?id={{$value.Id}}" class="btn btn-success btn-action"><i class="fas fa-list mr-1"></i>类型属性</a>
                        <a href="/admin/goodsType/edit?id={{$value.Id}}" class="btn btn-info btn-action"><i class="fas fa-edit"></i></a>
                        <a class="btn btn-danger btn-action delete" href="/admin/goodsType/delete?id={{$value.Id}}"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>

{{ template "admin/public/page_footer.html" .}}
{{end}}
