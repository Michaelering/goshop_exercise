{{ define "admin/role/index.html" }}
{{ template "admin/public/page_header.html" .}}

<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-users-cog mr-1"></i>角色列表</h3>
        <a href="/admin/role/add" class="btn btn-primary btn-sm"><i class="fas fa-plus mr-1"></i>增加角色</a>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>角色名称</th>
                    <th>角色描述</th>
                    <th class="text-center">状态</th>
                    <th class="text-center">操作</th>
                </tr>
            </thead>
            <tbody>
             {{range $key,$value := .roleList}}
            <tr>
                <td>{{$value.Title}}</td>
                <td>{{$value.Description}}</td>
                <td class="text-center">
                    <label class="status-toggle chStatus" data-id="{{$value.Id}}" data-table="role" data-field="status">
                        <input type="checkbox" {{if eq $value.Status 1}}checked{{end}}>
                        <span class="slider"></span>
                    </label>
                </td>
                <td class="text-center">
                    <a href="/admin/role/auth?id={{$value.Id}}" class="btn btn-warning btn-action"><i class="fas fa-key mr-1"></i>授权</a>
                    <a href="/admin/role/edit?id={{$value.Id}}" class="btn btn-info btn-action"><i class="fas fa-edit mr-1"></i>修改</a>
                    <a class="btn btn-danger btn-action delete" href="/admin/role/delete?id={{$value.Id}}"><i class="fas fa-trash mr-1"></i>删除</a>
                </td>
            </tr>
            {{end}}
            </tbody>
        </table>
    </div>
</div>

{{ template "admin/public/page_footer.html" .}}
{{end}}
