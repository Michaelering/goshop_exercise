{{ define "admin/role/add.html" }}
{{ template "admin/public/page_header.html" .}}

<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-user-plus mr-1"></i>增加角色</h3>
    </div>
    <div class="card-body">
        <form action="/admin/role/doAdd" method="post">
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">角色名称</label>
                <div class="col-sm-6">
                    <input type="text" name="title" class="form-control" placeholder="请输入角色名称" required>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">角色描述</label>
                <div class="col-sm-8">
                    <textarea name="description" class="form-control" rows="5" placeholder="请输入角色描述"></textarea>
                </div>
            </div>
            <div class="form-group row">
                <div class="col-sm-6 offset-sm-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check mr-1"></i>提交</button>
                    <a href="javascript:history.back()" class="btn btn-default ml-2"><i class="fas fa-arrow-left mr-1"></i>返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

{{ template "admin/public/page_footer.html" .}}
{{end}}
