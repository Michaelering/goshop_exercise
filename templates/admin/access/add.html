{{ define "admin/access/add.html" }}
{{ template "admin/public/page_header.html" .}}

<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-key mr-1"></i>增加权限</h3>
    </div>
    <div class="card-body">
        <form action="/admin/access/doAdd" method="post">
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">模块名称</label>
                <div class="col-sm-6">
                    <input type="text" name="module_name" class="form-control" placeholder="请输入模块名称" required>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">节点类型</label>
                <div class="col-sm-6">
                    <select name="type" id="type" class="form-control">
                        <option value="1">模块</option>
                        <option value="2">菜单</option>
                        <option value="3">操作</option>
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">操作名称</label>
                <div class="col-sm-6">
                    <input type="text" name="action_name" class="form-control" placeholder="请输入操作名称">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">操作地址</label>
                <div class="col-sm-6">
                    <input type="text" name="url" class="form-control" placeholder="请输入操作地址">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">所属模块</label>
                <div class="col-sm-6">
                    <select name="module_id" id="module_id" class="form-control">
                        <option value="0">---顶级模块---</option>
                        {{range $key,$value := .accessList}}
                            <option value="{{$value.Id}}">{{$value.ModuleName}}</option>
                        {{end}}
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">排序</label>
                <div class="col-sm-3">
                    <input type="number" name="sort" class="form-control" value="100">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">描述</label>
                <div class="col-sm-8">
                    <textarea name="description" class="form-control" rows="4" placeholder="请输入描述"></textarea>
                </div>
            </div>
            <div class="form-group row">
                <label class="col-sm-2 col-form-label text-right">状态</label>
                <div class="col-sm-6">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="status1" value="1" checked>
                        <label class="form-check-label" for="status1">显示</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="status" id="status0" value="0">
                        <label class="form-check-label" for="status0">隐藏</label>
                    </div>
                </div>
            </div>
            <div class="form-group row">
                <div class="col-sm-6 offset-sm-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check mr-1"></i>提交</button>
                    <a href="javascript:history.back()" class="btn btn-default ml-2"><i class="fas fa-arrow-left mr-1"></i>返回</a>
                </div>
            </div>
        </form>
    </div>
</div>

{{ template "admin/public/page_footer.html" .}}
{{end}}
