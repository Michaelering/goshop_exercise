{{ define "merchant/main/index.html" }}
{{ template "merchant/public/page_header.html" .}}
{{ template "merchant/public/page_aside.html" .}}

<div class="content-wrapper">
    <section class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1><i class="fas fa-store mr-2"></i>{{.shopName}} - 商户仪表盘</h1>
                </div>
            </div>
        </div>
    </section>

    <section class="content">
        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-3 col-6">
                    <div class="small-box bg-info">
                        <div class="inner">
                            <h3>{{.goodsCount}}</h3>
                            <p>商品总数</p>
                        </div>
                        <div class="icon">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <a href="/merchant/goods" class="small-box-footer">查看详情 <i class="fas fa-arrow-circle-right"></i></a>
                    </div>
                </div>
                <div class="col-lg-3 col-6">
                    <div class="small-box bg-success">
                        <div class="inner">
                            <h3>{{.orderCount}}</h3>
                            <p>订单总数</p>
                        </div>
                        <div class="icon">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                        <a href="/merchant/order" class="small-box-footer">查看详情 <i class="fas fa-arrow-circle-right"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

{{ template "merchant/public/page_footer.html" .}}
{{end}}
